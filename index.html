<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="weather_container"></div>
        <select id="lang_switch">
            <option value="zh-CN">简体中文</option>
            <option value="en-US">English</option>
        </select>
    </header>

    <div class="search_engine_container">
        <select id="search_engine">
            <option value="baidu">百度</option>
            <option value="google">Google</option>
            <option value="yandex">Yandex</option>
        </select>
        <input type="text" id="search_input" placeholder="请输入搜索内容">
        <button id="search_btn">搜索</button>
    </div>

    <div class="second_part_container">
        <div class="todo_container">
            <div class="todo_add">
                <input type="text" id="todo_input" placeholder="请输入待办事项">
                <button id="add_btn">添加</button>
            </div>
            <ul id="todo_list"></ul>
        </div>

        <div class="shortcut_container">
            <table class="shortcut_table" id="shortcut_table">
                <tbody>
                    <tr>
                        <td class="shortcut_cell">
                            <a href="https://www.bilibili.com" target="_blank">
                                <img class="site_icon" src="https://www.bilibili.com/favicon.ico" alt="哔哩哔哩">
                                <span class="site_name">哔哩哔哩</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://vidhub.tv/" target="_blank">
                                <img class="site_icon" src="https://vidhub.tv/favicon.ico" alt="VIDHUB">
                                <span class="site_name">VIDHUB</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://www.github.com" target="_blank">
                                <img class="site_icon" src="https://www.github.com/favicon.ico" alt="GitHub">
                                <span class="site_name">GitHub</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://www.qidian.com" target="_blank">
                                <img class="site_icon" src="https://www.qidian.com/favicon.ico" alt="起点中文网">
                                <span class="site_name">起点中文网</span>
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td class="shortcut_cell">
                            <a href="https://www.deepl.com/translator" target="_blank">
                                <span class="site_name">DeepL</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://translate.google.com" target="_blank">
                                <span class="site_name">谷歌翻译</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://www.doubao.com/chat/" target="_blank">
                                <span class="site_name">豆包</span>
                            </a>
                        </td>
                        <td class="shortcut_cell">
                            <a href="https://chat.openai.com" target="_blank">
                                <span class="site_name">ChatGPT</span>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="exchange_container">
        <div class="exchange_add">
            <input type="text" id="exchange_code_input" placeholder="输入货币对（如CNY/USD、EUR/JPY）">
            <button id="add_exchange_btn">添加</button>
            <button id="refresh_btn">刷新</button>
        </div>
        <div class="exchange_list" id="exchange_list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
